name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # pyphenix is not yet on PyPI; install from git so the resolver finds it.
      - name: Install pyphenix from git
        run: uv pip install --system "git+https://github.com/ferrinm/pyphenix@v0.3.3"

      - name: Install zarrmony-phenix and dev tools
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Test
        run: uv run pytest
